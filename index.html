<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotaract Control - Inicio de Sesión</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="logo">

                <!-- Reemplaza por tu logo -->
                <img src="img/logo.png" alt="Logo Rotaract" class="logo-img">

                <h1>INTERACT COCHABAMBA CONTROL</h1>

                

            </div>

            <div class="form-group">

                <label for="correo">
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    id="correo"
                    placeholder="ejemplo@gmail.com">

            </div>

            <div class="form-group">

                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Ingrese su contraseña">

            </div>

            <button
                id="btnLogin"
                class="btn-login">

                INICIAR SESIÓN

            </button>

            <div class="footer">

                <p>
                    &copy; 2026 Interact Club Cochabamba
                </p>

                <div class="version">
                    Sistema de Control de Asistencia y Pagos v1.0 - 2026
                </div>

            </div>

        </div>

    </div>

    <script type="module" src="js/login.js"></script>

</body>

</html>
