<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Editar Socio</title>

    <link
        rel="stylesheet"
        href="css/editar-socio.css">

</head>

<body>

    <div class="contenedor">

        <div class="cabecera">

            <h1>
                Editar Socio
            </h1>

            <button
                class="btnVolver"
                onclick="window.location.href='socios.html'">

                ← Volver

            </button>

        </div>

        <form id="formEditar">

            <div class="grupo">

                <label>
                    Nombre Completo
                </label>

                <input
                    type="text"
                    id="nombre"
                    required>

            </div>

            <div class="grupo">

                <label>
                    Número de Carnet
                </label>

                <input
                    type="text"
                    id="carnet"
                    required>

            </div>

            <div class="grupo">

                <label>
                    Fecha de Nacimiento
                </label>

                <input
                    type="date"
                    id="fechaNacimiento">

            </div>

            <div class="grupo">

                <label>
                    Fecha de Juramento
                </label>

                <input
                    type="date"
                    id="fechaJuramento">

            </div>

            <div class="grupo">

                <label>
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    id="correo">

            </div>

            <div class="grupo">

                <label>
                    Celular
                </label>

                <input
                    type="number"
                    id="celular">

            </div>

            <div class="grupo">

                <label>
                    Ocupación
                </label>

                <input
                    type="text"
                    id="ocupacion">

            </div>

            <div class="grupo">

                <label>
                    Estudios / Profesión
                </label>

                <input
                    type="text"
                    id="estudios">

            </div>

            <div class="grupo">

                <label>
                    Estado
                </label>

                <select id="estado">

                    <option value="Activo">
                        Activo
                    </option>

                    <option value="Inactivo">
                        Inactivo
                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btnGuardar">

                Guardar Cambios

            </button>

        </form>

    </div>

    <script
        type="module"
        src="js/editar-socio.js">
    </script>

</body>

</html>
