<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Editar Socio</title>

    <link
        rel="stylesheet"
        href="css/editar-socio.css">

</head>

<body>

    <div class="contenedor">

        <div class="cabecera">

            <h1>
                Editar Socio
            </h1>

            <button
                class="btnVolver"
                onclick="window.location.href='socios.html'">

                ← Volver

            </button>

        </div>

        <form id="formEditar">

            <div class="grupo">

                <label>
                    Nombre Completo
                </label>

                <input
                    type="text"
                    id="nombre"
                    required>

            </div>

            <div class="grupo">

                <label>
                    Celular
                </label>

                <input
                    type="text"
                    id="celular"
                    required>

            </div>

            <div class="grupo">

                <label>
                    Correo Electrónico
                </label>

                <input
                    type="email"
                    id="correo"
                    required>

            </div>

            <div class="grupo">

                <label>
                    Fecha de Nacimiento
                </label>

                <input
                    type="date"
                    id="fechaNacimiento"
                    required>

            </div>

            <button
                type="submit"
                class="btnGuardar">

                Guardar Cambios

            </button>

        </form>

    </div>

    <script
        type="module"
        src="js/editar-socio.js">
    </script>

</body>

</html>
