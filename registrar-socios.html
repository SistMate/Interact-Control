<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Registro de Socios</title>

    <link
        rel="stylesheet"
        href="css/registrar-socios.css">

</head>

<body>

    <div class="contenedor">

        <h1>
            Registro de Socios
        </h1>

        <form id="formSocio">

            <label>
                Nombre Completo
            </label>

            <input
                type="text"
                id="nombre"
                placeholder="Escribe el nombre completo del socio"
                required>

                <label>
                Celular
                 </label>

            
                <input
                type="text"
                id="celular"
                placeholder="Numero deCelular"
                required>

                <label>
                Correo Electrónico
                </label>

            <input
                type="email"
                id="correo"
                placeholder="Correo Electrónico"
                required>

            <label>
                Fecha de Nacimiento
            </label>

            <input
                type="date"
                id="fechaNacimiento"
                required>

            <button type="submit">
                Guardar Socio
            </button>

        </form>

        <button
            class="volver"
            onclick="window.location.href='socios.html'">

            Volver a Lista de Socios

        </button>

    </div>

    <script
        type="module"
        src="js/registrar-socios.js">
    </script>

</body>

</html>
